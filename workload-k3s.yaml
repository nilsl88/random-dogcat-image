apiVersion: v1
kind: Namespace
metadata:
  name: dogcat
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: random-dogcat
  namespace: dogcat
spec:
  replicas: 2
  selector:
    matchLabels:
      app: random-dogcat
  template:
    metadata:
      labels:
        app: random-dogcat
    spec:
      # Pod-level security context
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault

      containers:
      - name: random-dogcat
        image: docker.io/lundberg88/random-dogcat:latest
        resources:
          requests:
            memory: "20Mi"
          limits:
            memory: "50Mi"

        # Container-level security context
        securityContext:
          allowPrivilegeEscalation: true
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL

        ports:
        - containerPort: 8080

        # Mount the memory-backed tmp volume at /tmp
        volumeMounts:
        - name: tmp
          mountPath: /tmp

      # Define the tmp volume at the Pod level
      volumes:
      - name: tmp
        emptyDir:
          medium: Memory
          sizeLimit: 8Mi
---
apiVersion: v1
kind: Service
metadata:
  name: random-dogcat-service
  namespace: dogcat
spec:
  selector:
    app: random-dogcat
  ports:
    - protocol: TCP
      port: 80          # Internal Cluster Port
      targetPort: 8080    # Matches the container's exposed port
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: random-dogcat-ingress
  namespace: dogcat
  annotations:
    #nginx.ingress.kubernetes.io/rewrite-target: /
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: random-dogcat-service
            port:
              number: 80
